<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation — Panneau</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#07080d;
    --panel:#101218;
    --panel-2:#161922;
    --row:#171a23;
    --row-on:#1b2330;
    --line:#23272f;
    --line-soft:#1b1e26;
    --ink:#f2f4f8;
    --ink-2:#aeb4c2;
    --ink-3:#646b7c;
    --ink-4:#414757;
    --accent:oklch(0.70 0.17 245);
    --accent-bright:oklch(0.78 0.16 240);
    --accent-soft:oklch(0.70 0.17 245 / 0.16);
    --magenta:oklch(0.70 0.19 350);
    --track:#272b35;
    --radius:18px;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --sans:"Space Grotesk",system-ui,sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{height:100%;}
  body{
    font-family:var(--sans);
    background:
      radial-gradient(1200px 800px at 82% -8%, oklch(0.55 0.16 250 / 0.30), transparent 60%),
      radial-gradient(1000px 700px at 12% 110%, oklch(0.55 0.2 340 / 0.22), transparent 55%),
      var(--bg-0);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:34px 22px 64px;
    -webkit-font-smoothing:antialiased;
  }
  .tabbar,.panel,.fps{flex:0 0 auto;}

  /* ---------- Top tab bar ---------- */
  .tabbar{
    width:min(1080px,100%);
    display:flex;
    gap:6px;
    padding:8px;
    background:rgba(16,18,24,0.72);
    backdrop-filter:blur(18px);
    border:1px solid var(--line);
    border-radius:16px;
    margin-bottom:26px;
  }
  .tab{
    display:flex;align-items:center;gap:10px;
    padding:11px 16px;
    border-radius:11px;
    color:var(--ink-2);
    font-weight:600;font-size:15px;
    cursor:pointer;
    border:1px solid transparent;
    white-space:nowrap;
    transition:.16s;
  }
  .tab .key{color:var(--ink-4);font-family:var(--mono);font-size:12px;font-weight:600;}
  .tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .tab:hover{color:var(--ink);background:var(--panel-2);}
  .tab.active{
    background:var(--accent);
    color:#fff;
    box-shadow:0 8px 24px -8px var(--accent);
  }
  .tab.active .key{color:rgba(255,255,255,0.7);}
  .tab.logout{margin-left:auto;}

  /* ---------- Panel ---------- */
  .panel{
    width:min(1080px,100%);
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:0 40px 90px -30px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.02) inset;
    overflow:hidden;
  }
  .panel-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 26px;
    border-bottom:1px solid var(--line);
    background:rgba(0,0,0,0.18);
  }
  .panel-head .title{
    display:flex;align-items:center;gap:14px;
  }
  .panel-head h1{
    font-size:22px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;
  }
  .panel-head .dot{
    width:9px;height:9px;border-radius:50%;background:var(--accent-bright);
    box-shadow:0 0 14px var(--accent-bright);
  }
  .close{
    width:38px;height:38px;border-radius:11px;
    border:1px solid var(--line);background:var(--row);
    color:var(--ink-2);cursor:pointer;font-size:18px;
    display:grid;place-items:center;transition:.16s;
  }
  .close:hover{color:var(--ink);background:#202531;border-color:#333a47;}

  .panel-body{padding:24px 26px 28px;}

  .section-label{
    display:flex;align-items:center;gap:12px;
    font-size:13px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--ink-3);
    margin:6px 0 16px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:var(--line-soft);}
  .section-label .tick{width:6px;height:14px;border-radius:3px;background:var(--accent);}

  /* ---------- Playback ---------- */
  .playback{
    display:flex;align-items:center;gap:20px;
    background:var(--row);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 20px;
    margin-bottom:30px;
  }
  .play-btn{
    display:flex;align-items:center;gap:10px;
    padding:11px 20px;border-radius:11px;
    background:var(--accent);color:#fff;border:none;cursor:pointer;
    font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:.02em;
    transition:.16s;
    box-shadow:0 8px 22px -10px var(--accent);
  }
  .play-btn:hover{background:var(--accent-bright);}
  .play-btn.paused{background:var(--row-on);color:var(--ink);box-shadow:none;border:1px solid var(--line);}
  .play-btn svg{width:14px;height:14px;fill:currentColor;}
  .playback .pb-label{font-weight:600;font-size:16px;color:var(--ink-2);min-width:106px;}
  .playback .pb-slider{flex:1;}
  .playback .pb-val{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--ink);min-width:80px;text-align:right;}

  /* ---------- Mixer ---------- */
  .mixer{display:flex;flex-direction:column;gap:8px;}

  .row{
    display:grid;
    grid-template-columns:248px 124px 1fr 1fr;
    align-items:center;
    gap:22px;
    padding:14px 18px;
    background:var(--row);
    border:1px solid var(--line-soft);
    border-radius:13px;
    position:relative;
    transition:.18s;
  }
  .row::before{
    content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;
    background:transparent;transition:.18s;
  }
  .row.on{background:var(--row-on);border-color:#2b3340;}
  .row.on::before{background:var(--accent-bright);box-shadow:0 0 12px var(--accent);}
  .row.off .ctl{opacity:0.4;pointer-events:none;}
  .row.off .name{color:var(--ink-3);}

  /* toggle + name */
  .name-cell{display:flex;align-items:center;gap:14px;}
  .toggle{
    --w:46px;--h:26px;
    width:var(--w);height:var(--h);flex:none;
    border-radius:999px;background:var(--track);border:1px solid var(--line);
    position:relative;cursor:pointer;transition:.18s;
  }
  .toggle::after{
    content:"";position:absolute;top:2px;left:2px;
    width:20px;height:20px;border-radius:50%;background:#8a91a1;transition:.18s;
  }
  .toggle.on{background:var(--accent);border-color:var(--accent);}
  .toggle.on::after{left:22px;background:#fff;}
  .name{font-size:17px;font-weight:600;color:var(--ink);letter-spacing:-.01em;}

  /* waveform select */
  .wave{position:relative;}
  .wave select{
    appearance:none;-webkit-appearance:none;width:100%;
    font-family:var(--mono);font-size:14px;font-weight:600;
    color:var(--ink);background:#0b0d12;border:1px solid var(--line);
    border-radius:10px;padding:10px 34px 10px 14px;cursor:pointer;text-transform:lowercase;
  }
  .wave::after{
    content:"";position:absolute;right:13px;top:50%;transform:translateY(-60%) rotate(45deg);
    width:7px;height:7px;border-right:2px solid var(--ink-3);border-bottom:2px solid var(--ink-3);
    pointer-events:none;
  }
  .wave select:focus{outline:none;border-color:var(--accent);}

  /* param group: label / slider / value */
  .param{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;}
  .param .plabel{
    font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);
    width:46px;
  }
  .param .pval{
    font-family:var(--mono);font-weight:700;font-size:15px;color:var(--ink);
    min-width:88px;text-align:right;white-space:nowrap;
  }
  .param .pval .unit{font-size:12px;color:var(--ink-3);margin-left:3px;font-weight:600;}

  /* ---------- range sliders ---------- */
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:6px;
    background:var(--track);border-radius:999px;outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:var(--accent-bright);border:3px solid #0b0d12;
    box-shadow:0 0 0 1px var(--accent),0 4px 12px -2px var(--accent);
    cursor:pointer;transition:.12s;
  }
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.12);}
  input[type=range]::-moz-range-thumb{
    width:18px;height:18px;border-radius:50%;background:var(--accent-bright);
    border:3px solid #0b0d12;box-shadow:0 0 0 1px var(--accent);cursor:pointer;
  }
  .pb-slider input[type=range]{height:7px;}

  /* scrollbar */
  .panel-body::-webkit-scrollbar{width:10px;}

  /* ---------- footer fps ---------- */
  .fps{
    margin-top:26px;display:flex;align-items:center;gap:12px;
    padding:11px 20px;border-radius:999px;
    background:rgba(16,18,24,0.8);border:1px solid var(--line);backdrop-filter:blur(12px);
    font-weight:600;color:var(--ink-2);
  }
  .fps .live{width:9px;height:9px;border-radius:50%;background:oklch(0.72 0.18 145);box-shadow:0 0 10px oklch(0.72 0.18 145);}
  .fps .num{font-family:var(--mono);font-weight:700;color:var(--ink);}
  .fps .caret{color:var(--ink-3);}

  @media (max-width:880px){
    .row{grid-template-columns:1fr 1fr;gap:14px;}
    .name-cell{grid-column:1 / -1;}
    .wave{grid-column:1 / -1;}
  }
  @media (max-width:560px){
    .tab span.label{display:none;}
    .param{grid-template-columns:auto 1fr auto;}
  }
</style>
</head>
<body>

  <nav class="tabbar">
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M12 3v18M3 12h18M8 7l4-4 4 4M8 17l4 4 4-4M7 8l-4 4 4 4M17 8l4 4-4 4"/></svg><span class="label">Navigation</span><span class="key">W</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4z"/></svg><span class="label">Presets</span><span class="key">X</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="9" r="1.4" fill="currentColor" stroke="none"/><circle cx="15.5" cy="11" r="1.4" fill="currentColor" stroke="none"/></svg><span class="label">Graphics</span><span class="key">V</span></div>
    <div class="tab active"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18M8 5v14"/></svg><span class="label">Animation</span><span class="key">C</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 100 18c1.1 0 2-.9 2-2 0-1.5 1.5-2 3-2a4 4 0 004-4c0-5-4-8-9-8z"/></svg><span class="label">Palettes</span><span class="key">N</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M4 8h3l2-3h6l2 3h3v11H4z"/><circle cx="12" cy="13" r="3.2"/></svg><span class="key">B</span></div>
    <div class="tab logout"><svg viewBox="0 0 24 24"><path d="M14 4h4a2 2 0 012 2v12a2 2 0 01-2 2h-4M10 12H3m0 0l3-3m-3 3l3 3"/></svg><span class="label">Logout</span></div>
  </nav>

  <section class="panel">
    <header class="panel-head">
      <div class="title"><span class="dot"></span><h1>Animation</h1></div>
      <button class="close" aria-label="Fermer">✕</button>
    </header>

    <div class="panel-body">

      <div class="section-label"><span class="tick"></span>Playback</div>
      <div class="playback">
        <button class="play-btn" id="driftBtn">
          <svg viewBox="0 0 24 24" id="driftIcon"><path d="M8 5v14l11-7z"/></svg>
          <span id="driftLabel">Drift</span>
        </button>
        <span class="pb-label">Global Speed</span>
        <div class="pb-slider"><input type="range" min="0" max="300" value="10" id="globalSpeed"></div>
        <span class="pb-val" id="globalVal">×0.10</span>
      </div>

      <div class="section-label"><span class="tick"></span>Mixer</div>
      <div class="mixer" id="mixer"></div>

    </div>
  </section>

  <div class="fps"><span class="live"></span><span class="num" id="fps">60</span> fps <span class="caret">▾</span></div>

<script>
  const ROWS = [
    {name:"Palette Offset",      wave:"pulse", speed:2.1, range:0.26, unit:"cycle", on:true,  rmin:0, rmax:1,   rstep:0.01},
    {name:"Height Palette Shift",wave:"loop",  speed:1.2, range:13.0, unit:"",      on:false, rmin:0, rmax:30,  rstep:0.5},
    {name:"Light Angle",         wave:"loop",  speed:0.4, range:1.00, unit:"turn",  on:false, rmin:0, rmax:2,   rstep:0.01},
    {name:"Texture Drift",       wave:"sine",  speed:1.0, range:1.00, unit:"",      on:false, rmin:0, rmax:4,   rstep:0.05},
    {name:"Sky Reflection Drift",wave:"pulse", speed:0.8, range:0.28, unit:"",      on:true,  rmin:0, rmax:1,   rstep:0.01},
    {name:"Phase Coloring",      wave:"pulse", speed:0.3, range:6.0,  unit:"",      on:false, rmin:0, rmax:20,  rstep:0.5},
    {name:"Varnish",             wave:"pulse", speed:2.3, range:5.65, unit:"",      on:false, rmin:0, rmax:12,  rstep:0.05},
    {name:"Micro Bump",          wave:"pulse", speed:0.3, range:0.50, unit:"",      on:false, rmin:0, rmax:2,   rstep:0.01},
    {name:"Displacement",        wave:"sine",  speed:0.2, range:0.020,unit:"",      on:false, rmin:0, rmax:0.1, rstep:0.001},
    {name:"Tessellation",        wave:"sine",  speed:0.1, range:2.0,  unit:"",      on:false, rmin:0, rmax:8,   rstep:0.1},
  ];
  const WAVES = ["pulse","sine","loop","saw","noise"];

  const mixer = document.getElementById('mixer');

  function fmtRange(v, step){
    if(step >= 1) return (+v).toFixed(1);
    if(step >= 0.1) return (+v).toFixed(1);
    if(step >= 0.01) return (+v).toFixed(2);
    return (+v).toFixed(3);
  }

  ROWS.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'row ' + (r.on ? 'on' : 'off');
    row.innerHTML = `
      <div class="name-cell">
        <div class="toggle ${r.on?'on':''}" role="switch" aria-checked="${r.on}" tabindex="0"></div>
        <span class="name">${r.name}</span>
      </div>
      <div class="wave ctl">
        <select>${WAVES.map(w=>`<option ${w===r.wave?'selected':''}>${w}</option>`).join('')}</select>
      </div>
      <div class="param ctl">
        <span class="plabel">Speed</span>
        <input type="range" min="0" max="300" step="1" value="${Math.round(r.speed*100)}" data-kind="speed">
        <span class="pval speedVal">×${r.speed.toFixed(1)}</span>
      </div>
      <div class="param ctl">
        <span class="plabel">Range</span>
        <input type="range" min="${r.rmin}" max="${r.rmax}" step="${r.rstep}" value="${r.range}" data-kind="range">
        <span class="pval rangeVal">${fmtRange(r.range, r.rstep)}<span class="unit">${r.unit}</span></span>
      </div>`;
    mixer.appendChild(row);

    const toggle = row.querySelector('.toggle');
    const setOn = (on) => {
      r.on = on;
      toggle.classList.toggle('on', on);
      toggle.setAttribute('aria-checked', on);
      row.classList.toggle('on', on);
      row.classList.toggle('off', !on);
    };
    toggle.addEventListener('click', () => setOn(!r.on));
    toggle.addEventListener('keydown', e => { if(e.key===' '||e.key==='Enter'){e.preventDefault();setOn(!r.on);} });

    const speedIn = row.querySelector('[data-kind=speed]');
    const speedOut = row.querySelector('.speedVal');
    speedIn.addEventListener('input', () => { speedOut.textContent = '×' + (speedIn.value/100).toFixed(1); });

    const rangeIn = row.querySelector('[data-kind=range]');
    const rangeOut = row.querySelector('.rangeVal');
    rangeIn.addEventListener('input', () => {
      rangeOut.innerHTML = fmtRange(rangeIn.value, r.rstep) + `<span class="unit">${r.unit}</span>`;
    });
  });

  // Global speed
  const gs = document.getElementById('globalSpeed'), gv = document.getElementById('globalVal');
  gs.addEventListener('input', () => { gv.textContent = '×' + (gs.value/100).toFixed(2); });

  // Drift play/pause
  const driftBtn = document.getElementById('driftBtn');
  const driftLabel = document.getElementById('driftLabel');
  const driftIcon = document.getElementById('driftIcon');
  let playing = true;
  driftBtn.addEventListener('click', () => {
    playing = !playing;
    driftBtn.classList.toggle('paused', !playing);
    driftLabel.textContent = playing ? 'Drift' : 'Paused';
    driftIcon.innerHTML = playing ? '<path d="M8 5v14l11-7z"/>' : '<path d="M7 5h3v14H7zM14 5h3v14h-3z"/>';
    document.getElementById('fps').textContent = playing ? '60' : '0';
  });

  document.querySelector('.close').addEventListener('click', () => {
    document.querySelector('.panel').animate(
      [{opacity:1,transform:'scale(1)'},{opacity:0,transform:'scale(0.98)'}],
      {duration:180,fill:'forwards'});
  });
</script>
</body>
</html>
